name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  # ── 1. Validate ────────────────────────────────────────────────────────────
  # Reject tags that don't match N.N.N exactly and tags whose commit is not
  # reachable from master.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          if ! [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match required format N.N.N (no prefix, no suffix)."
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch master and all tags
        run: git fetch origin master --tags

      - name: Verify tag commit is on master
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "::error::Tag commit $GITHUB_SHA is not an ancestor of origin/master."
            exit 1
          fi

  # ── 2. Test ────────────────────────────────────────────────────────────────
  # All unit tests must pass before any artifact is built or released.
  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # The solution includes the MAUI app project (net10.0-android on Linux),
      # so the Android MAUI workload is required for solution restore to succeed.
      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      # - name: Run tests
      #  run: dotnet test --configuration Release --blame-hang --blame-hang-timeout 2m

  # ── 3. Build – Windows ────────────────────────────────────────────────────
  # Produces:
  #   • BlinkTalk-windows-{version}.msi — WiX installer wrapping the self-contained
  #     (unpackaged) build. No code-signing certificate required.
  build-windows:
    needs: test
    runs-on: windows-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Compute version code
        shell: bash
        run: |
          IFS='.' read -ra P <<< "$VERSION"
          echo "VERSION_CODE=$((${P[0]} * 10000 + ${P[1]} * 100 + ${P[2]}))" >> "$GITHUB_ENV"

      - name: Build portable (self-contained)
        shell: bash
        run: |
          dotnet publish Source/BlinkTalk/BlinkTalk.csproj \
            -f net10.0-windows10.0.19041.0 \
            -p:WindowsPublish=true \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:ApplicationDisplayVersion="$VERSION" \
            -p:ApplicationVersion="$VERSION_CODE" \
            -p:WindowsPackageType=None \
            -o publish/portable

      - name: Build MSI installer
        shell: bash
        run: |
          dotnet build Source/Installer/BlinkTalk.wixproj \
            -c Release \
            -p:ProductVersion="$VERSION" \
            -p:AppPublishDir="$PWD/publish/portable" \
            -o publish/installer
          cp publish/installer/BlinkTalk-Setup.msi "BlinkTalk-windows-$VERSION.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: BlinkTalk-windows-${{ env.VERSION }}.msi

  # ── 4. Build – Android ────────────────────────────────────────────────────
  # Produces:
  #   • BlinkTalk-android-{version}.apk — release-signed APK
  #   • BlinkTalk-GooglePlayStore-{version}.aab — release-signed App Bundle
  #
  # Required secrets:
  #   ANDROID_KEYSTORE          – Base64-encoded JKS/PKCS12 keystore.
  #   ANDROID_KEYSTORE_PASSWORD – Keystore password.
  #   ANDROID_KEY_ALIAS         – Key alias inside the keystore.
  #   ANDROID_KEY_PASSWORD      – Key password.
  build-android:
    needs: test
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Compute version code
        run: |
          IFS='.' read -ra P <<< "$VERSION"
          echo "VERSION_CODE=$((${P[0]} * 10000 + ${P[1]} * 100 + ${P[2]}))" >> "$GITHUB_ENV"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: echo "$ANDROID_KEYSTORE" | base64 --decode > "$RUNNER_TEMP/keystore.jks"

      - name: Build signed Android packages
        run: |
          dotnet publish Source/BlinkTalk/BlinkTalk.csproj \
            -f net10.0-android \
            -c Release \
            -p:ApplicationDisplayVersion="$VERSION" \
            -p:ApplicationVersion="$VERSION_CODE" \
            -p:AndroidSigningKeyStore="$RUNNER_TEMP/keystore.jks" \
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -p:AndroidPackageFormats=apk%3Baab \
            -o publish/android

      - name: Rename Android packages
        run: |
          # MAUI emits both an unsigned "*.apk" and the installable signed APK.
          # Prefer a signed package regardless of filename casing or exact suffix.
          APK=$(find publish/android -type f \( -iname "*-signed.apk" -o -iname "*signed*.apk" \) | head -1)
          if [ -z "$APK" ]; then
            APK=$(find publish/android -type f -name "*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "::error::No APK found under publish/android."
            exit 1
          fi
          cp "$APK" "BlinkTalk-android-$VERSION.apk"

          AAB=$(find publish/android -type f -iname "*-signed.aab" | head -1)
          if [ -z "$AAB" ]; then
            AAB=$(find publish/android -type f -name "*.aab" | head -1)
          fi
          if [ -z "$AAB" ]; then
            echo "::error::No AAB found under publish/android."
            exit 1
          fi
          cp "$AAB" "BlinkTalk-GooglePlayStore-$VERSION.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            BlinkTalk-android-${{ env.VERSION }}.apk
            BlinkTalk-GooglePlayStore-${{ env.VERSION }}.aab

  # ── 5. Release ────────────────────────────────────────────────────────────
  # Creates a GitHub Release and attaches all build artifacts.
  # Only runs if every preceding job succeeded.
  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-artifacts

      - uses: actions/download-artifact@v4
        with:
          name: android-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BlinkTalk ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            BlinkTalk-windows-${{ env.VERSION }}.msi
            BlinkTalk-android-${{ env.VERSION }}.apk
            BlinkTalk-GooglePlayStore-${{ env.VERSION }}.aab
